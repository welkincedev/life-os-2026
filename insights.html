<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS — Insights</title>
    <meta name="description" content="Visualize your habits, mood, energy, and life balance with LifeOS Insights.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#0f172a',
                        card: '#1e293b',
                        cardHover: '#253349',
                        accent: '#22c55e',
                        accentDim: 'rgba(34, 197, 94, 0.12)',
                        textPrimary: '#e2e8f0',
                        textSecondary: '#94a3b8',
                        textMuted: '#64748b',
                        border: '#334155',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 3px; }

        .glow-card { transition: all 0.3s ease; }
        .glow-card:hover { box-shadow: 0 0 30px rgba(129, 140, 248, 0.05); border-color: rgba(129, 140, 248, 0.15); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s ease-out forwards; }
        .fade-up-1 { animation-delay: 0.08s; opacity: 0; }
        .fade-up-2 { animation-delay: 0.16s; opacity: 0; }
        .fade-up-3 { animation-delay: 0.24s; opacity: 0; }
        .fade-up-4 { animation-delay: 0.32s; opacity: 0; }

        /* Heatmap cell */
        .heat-cell {
            width: 14px; height: 14px;
            border-radius: 3px;
            transition: all 0.15s ease;
        }
        .heat-cell:hover { transform: scale(1.4); z-index: 10; }

        /* Range button */
        .range-btn.active-range {
            background: rgba(129, 140, 248, 0.12);
            border-color: rgba(129, 140, 248, 0.4);
            color: #a5b4fc;
        }

        /* Chart.js dark theme override */
        canvas { border-radius: 12px; }
    </style>
</head>
<body class="bg-base text-textPrimary min-h-screen font-sans">

    <div id="navbar-container"></div>

    <div class="flex">
        <div id="sidebar-container"></div>

        <main class="flex-1 p-6 md:p-10 md:ml-64 mt-16 max-w-6xl">

            <!-- Page Header -->
            <div class="flex items-center justify-between mb-8 fade-up">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Insights</h1>
                    <p class="text-textMuted mt-1 text-sm">Your life, visualized.</p>
                </div>
                <div class="flex gap-2">
                    <button data-range="7" class="range-btn active-range px-4 py-2 rounded-xl border border-border text-sm font-medium transition">7 Days</button>
                    <button data-range="14" class="range-btn px-4 py-2 rounded-xl border border-border text-textMuted text-sm font-medium transition hover:border-accent/30">14 Days</button>
                    <button data-range="30" class="range-btn px-4 py-2 rounded-xl border border-border text-textMuted text-sm font-medium transition hover:border-accent/30">30 Days</button>
                </div>
            </div>

            <!-- Overview Stat Cards -->
            <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 fade-up fade-up-1">
                <div class="glow-card bg-card border border-border rounded-2xl p-5">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-lg">😊</span>
                        <p class="text-textMuted text-xs font-medium uppercase tracking-wider">Avg Mood</p>
                    </div>
                    <p id="stat-mood" class="text-2xl font-bold">—</p>
                </div>
                <div class="glow-card bg-card border border-border rounded-2xl p-5">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-lg">⚡</span>
                        <p class="text-textMuted text-xs font-medium uppercase tracking-wider">Avg Energy</p>
                    </div>
                    <p id="stat-energy" class="text-2xl font-bold">—</p>
                </div>
                <div class="glow-card bg-card border border-border rounded-2xl p-5">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-lg">🔥</span>
                        <p class="text-textMuted text-xs font-medium uppercase tracking-wider">Habits Done</p>
                    </div>
                    <p id="stat-habits" class="text-2xl font-bold">—</p>
                </div>
                <div class="glow-card bg-card border border-border rounded-2xl p-5">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-lg">📋</span>
                        <p class="text-textMuted text-xs font-medium uppercase tracking-wider">Days Logged</p>
                    </div>
                    <p id="stat-logged" class="text-2xl font-bold">—</p>
                </div>
            </section>

            <!-- Habit Heatmap -->
            <section class="glow-card bg-card border border-border rounded-2xl p-6 mb-6 fade-up fade-up-2">
                <div class="flex items-center gap-2 mb-5">
                    <div class="w-7 h-7 rounded-lg bg-green-500/10 flex items-center justify-center">
                        <span class="text-xs">✅</span>
                    </div>
                    <h2 class="font-semibold text-sm">Habit Heatmap</h2>
                    <span class="text-textMuted text-xs ml-auto">Less → More</span>
                </div>
                <div id="habit-heatmap" class="flex gap-[3px] flex-wrap">
                    <!-- Heatmap cells injected by insights.js -->
                </div>
                <div class="flex items-center gap-2 mt-3">
                    <div class="flex gap-[3px]">
                        <div class="heat-cell" style="background: #161b22"></div>
                        <div class="heat-cell" style="background: rgba(129,140,248,0.15)"></div>
                        <div class="heat-cell" style="background: rgba(129,140,248,0.35)"></div>
                        <div class="heat-cell" style="background: rgba(129,140,248,0.6)"></div>
                        <div class="heat-cell" style="background: #818cf8"></div>
                    </div>
                </div>
            </section>

            <!-- Mood & Energy Trends (side by side) -->
            <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <!-- Mood Trend -->
                <div class="glow-card bg-card border border-border rounded-2xl p-6 fade-up fade-up-3">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-7 h-7 rounded-lg bg-yellow-500/10 flex items-center justify-center">
                            <span class="text-xs">😊</span>
                        </div>
                        <h2 class="font-semibold text-sm">Mood Trend</h2>
                    </div>
                    <div class="h-48">
                        <canvas id="mood-chart"></canvas>
                    </div>
                </div>

                <!-- Energy Trend -->
                <div class="glow-card bg-card border border-border rounded-2xl p-6 fade-up fade-up-3">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-7 h-7 rounded-lg bg-orange-500/10 flex items-center justify-center">
                            <span class="text-xs">⚡</span>
                        </div>
                        <h2 class="font-semibold text-sm">Energy Trend</h2>
                    </div>
                    <div class="h-48">
                        <canvas id="energy-chart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Life Balance Wheel -->
            <section class="glow-card bg-card border border-border rounded-2xl p-6 mb-8 fade-up fade-up-4">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-7 h-7 rounded-lg bg-purple-500/10 flex items-center justify-center">
                        <span class="text-xs">🎯</span>
                    </div>
                    <h2 class="font-semibold text-sm">Life Balance Wheel</h2>
                    <span class="text-textMuted text-xs ml-auto">Based on your recent data</span>
                </div>
                <div class="flex justify-center">
                    <div class="w-full max-w-md h-72">
                        <canvas id="balance-chart"></canvas>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/db.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="js/weather.js"></script>
    <script type="module" src="js/insights.js"></script>
</html>
