<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS — Habit Tracker</title>
    <meta name="description" content="Build and track daily habits with streaks, heatmaps, and insights.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#0f172a',
                        card: '#1e293b',
                        cardHover: '#253349',
                        accent: '#22c55e',
                        accentDim: 'rgba(34, 197, 94, 0.12)',
                        border: '#334155',
                        textPrimary: '#e2e8f0',
                        textSecondary: '#94a3b8',
                        textMuted: '#64748b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.5s ease-out forwards; }
        .fade-up-1 { animation-delay: 0.06s; opacity: 0; }
        .fade-up-2 { animation-delay: 0.12s; opacity: 0; }
        .fade-up-3 { animation-delay: 0.18s; opacity: 0; }
        .fade-up-4 { animation-delay: 0.24s; opacity: 0; }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes checkBounce { 0% { transform: scale(1); } 40% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* Cards */
        .glow-card { transition: all 0.3s ease; }
        .glow-card:hover { box-shadow: 0 0 30px rgba(34, 197, 94, 0.06); border-color: rgba(34, 197, 94, 0.2); }

        .habit-card {
            transition: all 0.25s ease;
        }
        .habit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        /* Checkbox */
        .habit-checkbox {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .habit-checkbox:hover { border-color: #22c55e; }
        .habit-checkbox.checked {
            background: #22c55e;
            border-color: #22c55e;
            animation: checkBounce 0.35s ease;
        }
        .habit-checkbox.checked::after {
            content: '✓';
            color: #0f172a;
            font-weight: 700;
            font-size: 14px;
        }

        /* Heatmap cell */
        .heat-cell {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            transition: all 0.15s ease;
        }
        .heat-cell:hover { transform: scale(1.15); z-index: 5; }

        /* Category pill */
        .cat-pill { transition: all 0.2s ease; }
        .cat-pill.selected {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.4);
            color: #22c55e;
        }

        /* Delete button */
        .delete-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .habit-card:hover .delete-btn { opacity: 1; }

        /* Streak fire */
        .streak-fire { display: inline-flex; gap: 1px; font-size: 12px; }
    </style>
</head>
<body class="bg-base text-textPrimary min-h-screen font-sans">

    <div id="navbar-container"></div>

    <div class="flex">
        <div id="sidebar-container"></div>

        <main class="flex-1 p-6 md:p-10 md:ml-64 mt-16 max-w-6xl">

            <!-- Page Header -->
            <div class="flex items-center justify-between mb-8 fade-up">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Habit Tracker</h1>
                    <p class="text-textMuted mt-1 text-sm">Build streaks, build yourself.</p>
                </div>
                <button id="add-habit-btn"
                    class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-medium hover:shadow-lg hover:shadow-green-500/20 transition-all active:scale-[0.97] text-sm">
                    + New Habit
                </button>
            </div>

            <!-- =================== STREAK OVERVIEW =================== -->
            <section id="streak-overview" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 fade-up fade-up-1">
                <!-- Injected by habits.js -->
            </section>

            <!-- =================== WEEKLY HEATMAP =================== -->
            <section class="glow-card bg-card border border-border rounded-2xl p-6 mb-8 fade-up fade-up-2">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-2">
                        <div class="w-7 h-7 rounded-lg bg-green-500/10 flex items-center justify-center">
                            <span class="text-xs">📅</span>
                        </div>
                        <h2 class="font-semibold text-sm">This Week</h2>
                    </div>
                    <div class="flex items-center gap-2 text-[11px] text-textMuted">
                        <span>Less</span>
                        <div class="flex gap-1">
                            <div class="w-3 h-3 rounded bg-border/60"></div>
                            <div class="w-3 h-3 rounded" style="background: rgba(34,197,94,0.2)"></div>
                            <div class="w-3 h-3 rounded" style="background: rgba(34,197,94,0.5)"></div>
                            <div class="w-3 h-3 rounded bg-accent"></div>
                        </div>
                        <span>More</span>
                    </div>
                </div>
                <div id="weekly-heatmap" class="grid grid-cols-7 gap-2">
                    <!-- Injected by habits.js -->
                </div>
            </section>

            <!-- =================== HABITS LIST =================== -->
            <section class="fade-up fade-up-3">
                <div class="flex items-center gap-2 mb-5">
                    <div class="w-7 h-7 rounded-lg bg-green-500/10 flex items-center justify-center">
                        <span class="text-xs">🎯</span>
                    </div>
                    <h2 class="font-semibold text-sm">My Habits</h2>
                    <span id="habit-count" class="text-textMuted text-xs ml-1"></span>
                </div>
                <div id="habits-list" class="space-y-3">
                    <!-- Injected by habits.js -->
                </div>
            </section>

            <!-- =================== ADD HABIT MODAL =================== -->
            <div id="add-habit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div class="bg-card border border-border rounded-3xl p-8 w-full max-w-md shadow-2xl shadow-black/50 pop-in">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold">Create New Habit</h2>
                        <button id="close-habit-modal" class="w-8 h-8 rounded-lg flex items-center justify-center text-textMuted hover:text-textPrimary hover:bg-base transition">✕</button>
                    </div>

                    <form id="habit-form" class="space-y-5">
                        <!-- Habit Name -->
                        <div>
                            <label class="block text-xs font-medium text-textSecondary mb-1.5 uppercase tracking-wider">Habit Name</label>
                            <input type="text" id="habit-name" required
                                class="w-full px-4 py-3 rounded-xl bg-base border border-border text-textPrimary placeholder-textMuted focus:outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition text-sm"
                                placeholder="e.g., Morning meditation">
                        </div>

                        <!-- Icon -->
                        <div>
                            <label class="block text-xs font-medium text-textSecondary mb-1.5 uppercase tracking-wider">Icon (emoji)</label>
                            <input type="text" id="habit-icon"
                                class="w-full px-4 py-3 rounded-xl bg-base border border-border text-textPrimary placeholder-textMuted focus:outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition text-sm"
                                placeholder="🧘" maxlength="2">
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-xs font-medium text-textSecondary mb-2 uppercase tracking-wider">Category</label>
                            <div class="flex flex-wrap gap-2" id="category-pills">
                                <button type="button" data-cat="health" class="cat-pill selected px-4 py-2 rounded-xl border border-border text-textSecondary text-sm font-medium">💪 Health</button>
                                <button type="button" data-cat="life" class="cat-pill px-4 py-2 rounded-xl border border-border text-textSecondary text-sm font-medium">🌱 Life</button>
                                <button type="button" data-cat="study" class="cat-pill px-4 py-2 rounded-xl border border-border text-textSecondary text-sm font-medium">📚 Study</button>
                                <button type="button" data-cat="work" class="cat-pill px-4 py-2 rounded-xl border border-border text-textSecondary text-sm font-medium">💼 Work</button>
                            </div>
                        </div>

                        <!-- Frequency -->
                        <div>
                            <label class="block text-xs font-medium text-textSecondary mb-1.5 uppercase tracking-wider">Frequency</label>
                            <select id="habit-frequency"
                                class="w-full px-4 py-3 rounded-xl bg-base border border-border text-textPrimary focus:outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition text-sm">
                                <option value="daily">Daily</option>
                                <option value="weekdays">Weekdays</option>
                                <option value="weekly">Weekly</option>
                            </select>
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-3 pt-2">
                            <button type="submit" id="habit-submit-btn"
                                class="flex-1 py-3 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-medium hover:shadow-lg hover:shadow-green-500/20 transition-all active:scale-[0.97] text-sm">
                                Save Habit
                            </button>
                            <button type="button" id="close-habit-modal-2"
                                class="flex-1 py-3 rounded-xl border border-border text-textSecondary hover:bg-base transition text-sm">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/db.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="js/weather.js"></script>
    <script type="module" src="js/habits.js"></script>
</body>
</html>
