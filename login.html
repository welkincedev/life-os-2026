<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS — Login</title>
    <meta name="description" content="Sign in to your LifeOS dashboard.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#0f172a',
                        card: '#1e293b',
                        accent: '#22c55e',
                        textPrimary: '#e2e8f0',
                        textSecondary: '#94a3b8',
                        textMuted: '#64748b',
                        border: '#334155',
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.5s ease-out forwards;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .float {
            animation: float 4s ease-in-out infinite;
        }

        /* Loading overlay */
        #auth-loading {
            transition: opacity 0.3s;
        }
    </style>
</head>

<body class="bg-base text-textPrimary min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-accent/5 blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-emerald-500/5 blur-3xl"></div>
    </div>

    <!-- Loading Overlay (shown until auth state resolves) -->
    <div id="auth-loading" class="fixed inset-0 bg-base z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="text-5xl mb-4 float">🧬</div>
            <p class="text-textMuted text-sm">Loading LifeOS...</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="w-full max-w-md px-6 relative z-10 fade-up" id="login-container" style="display:none;">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-accent/15 flex items-center justify-center">
                    <span class="text-2xl">🧬</span>
                </div>
                <div class="text-left">
                    <span class="text-2xl font-black text-textPrimary tracking-tight block">LifeOS</span>
                    <span class="text-[10px] text-textMuted uppercase tracking-[0.2em] font-medium">Personal
                        Dashboard</span>
                </div>
            </a>
        </div>

        <!-- Login Card -->
        <div class="bg-card border border-border/50 rounded-3xl p-8 shadow-2xl shadow-black/30">
            <h1 id="login-heading" class="text-2xl font-bold mb-1">Welcome back</h1>
            <p id="login-subtext" class="text-textMuted text-sm mb-8">Sign in to continue to your dashboard</p>

            <!-- Email/Password Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label for="login-email"
                        class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Email</label>
                    <input type="email" id="login-email" required
                        class="w-full px-4 py-3.5 rounded-xl bg-base border border-border/40 text-textPrimary placeholder-textMuted text-sm focus:outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label for="login-password"
                        class="block text-xs font-semibold uppercase tracking-wider text-textMuted mb-2">Password</label>
                    <input type="password" id="login-password" required
                        class="w-full px-4 py-3.5 rounded-xl bg-base border border-border/40 text-textPrimary placeholder-textMuted text-sm focus:outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition"
                        placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" id="login-btn"
                    class="w-full py-3.5 rounded-xl bg-accent hover:bg-accent/90 text-base text-sm font-semibold transition hover:shadow-lg hover:shadow-accent/20 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-border/30"></div>
                <span class="text-textMuted text-xs uppercase tracking-wider font-medium">or</span>
                <div class="flex-1 h-px bg-border/30"></div>
            </div>

            <!-- Google Sign In -->
            <button id="google-login-btn"
                class="w-full py-3.5 rounded-xl border border-border/40 text-textSecondary text-sm font-medium hover:bg-white/[0.03] hover:border-border transition flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107"
                        d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" />
                    <path fill="#FF3D00"
                        d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z" />
                    <path fill="#4CAF50"
                        d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z" />
                    <path fill="#1976D2"
                        d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z" />
                </svg>
                Continue with Google
            </button>

            <!-- Sign Up Link -->
            <p class="text-center text-textMuted text-sm mt-6">
                <span id="toggle-text">Don't have an account?</span>
                <a href="#" id="show-signup" class="text-accent hover:text-accent/80 font-semibold ml-1 transition">Sign
                    up</a>
            </p>
        </div>

        <!-- Error Message -->
        <div id="auth-error"
            class="hidden mt-4 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center font-medium">
        </div>

        <!-- Footer -->
        <p class="text-center text-textMuted text-xs mt-8">&copy; 2026 LifeOS. Built for you.</p>
    </main>

    <!-- Firebase Auth (loaded as ES module) -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>

    <!-- Show login after brief delay (auth state resolves) -->
    <script type="module">
        import { auth } from "./js/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Handle loader and early redirection
        onAuthStateChanged(auth, (user) => {
            const loader = document.getElementById("auth-loading");
            const container = document.getElementById("login-container");

            if (user) {
                // Keep loader visible and redirect immediately
                window.location.href = "dashboard.html";
            } else {
                // Not logged in — show the login form
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    container.style.display = "block";
                }, 300);
            }
        });
    </script>
</body>

</html>
